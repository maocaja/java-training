spring:
  application:
    name: pricing-api

  # Profile default para correr localmente sin setear SPRING_PROFILES_ACTIVE.
  # En AWS se setea SPRING_PROFILES_ACTIVE=aws en el task definition.
  profiles:
    default: dev

server:
  port: ${SERVER_PORT:8082}

# --- Actuator ---
# Minimo seguro: solo health e info publicamente.
# Expande en perfiles especificos (dev).
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
