# Profile aws: logging production-appropriate.
# Sin DEBUG: ruido y costo en CloudWatch Logs.
logging:
  level:
    root: INFO
    com.mauricio.pricingapi: INFO
    org.springframework.web: WARN

# Actuator minimo en prod.
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: never

  metrics:
    tags:
      application: pricing-api

  cloudwatch:
    metrics:
      export:
        namespace: JavaTraining/PricingApi
        step: 60s
        batch-size: 20
        enabled: true

  prometheus:
    metrics:
      export:
        enabled: true
