# --- DOCKER COMPOSE ---
# Levanta la app + PostgreSQL con un solo comando: docker compose up
#
# En desarrollo usamos H2 (en memoria, sin instalar nada).
# En produccion (Docker) usamos PostgreSQL (real, persistente).
# Spring Boot cambia la BD automaticamente segun las variables de entorno.

services:
  # --- Base de datos PostgreSQL ---
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: propertydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      # Persistir datos entre reinicios del container
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Esperar a que PostgreSQL este listo antes de iniciar la app
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Nuestra aplicacion Spring Boot ---
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Spring Boot lee estas variables automaticamente y sobreescribe application.yml.
      # Convencion: SPRING_DATASOURCE_URL → spring.datasource.url
      # (puntos → underscores, mayusculas)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/propertydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # JWT config — en produccion vendria de secrets manager
      JWT_SECRET: dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlbnM=
      JWT_EXPIRATION_MS: 3600000
    depends_on:
      db:
        # No iniciar la app hasta que PostgreSQL pase el healthcheck
        condition: service_healthy

volumes:
  postgres_data:
