spring:
  application:
    name: property-api

  # --- Profile por default ---
  # Si no se especifica SPRING_PROFILES_ACTIVE, activa "dev".
  # En AWS, el task definition setea SPRING_PROFILES_ACTIVE=aws.
  profiles:
    default: dev

  # --- VIRTUAL THREADS (Java 21) ---
  # Una sola linea activa virtual threads para todos los requests HTTP.
  # Cada request corre en un virtual thread (~pocos KB) en vez de platform thread (~1MB).
  # Permite miles de requests concurrentes esperando I/O sin agotar threads.
  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      # Hibernate solo valida que @Entity matcheen el schema.
      # Flyway es el unico que modifica el schema.
      # Si hay mismatch, la app no arranca (fail fast).
      ddl-auto: validate
    # show-sql y format-sql se configuran por profile
    # (verbose en dev, desactivado en aws por costos de CloudWatch)

  # --- Flyway (schema versioning) ---
  # Corre al arrancar ANTES que Hibernate.
  # Lee V<n>__*.sql de classpath:db/migration/
  # Mantiene historial en flyway_schema_history.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# --- JWT Config ---
# El secret se va a externalizar a env var en B3.
jwt:
  secret: dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlbnM=
  expiration-ms: 3600000  # 1 hora

# URL del pricing-api (JSON-RPC).
# En AWS se setea via env var al URL del servicio interno.
services:
  pricing:
    url: ${PRICING_SERVICE_URL:http://localhost:8082}

server:
  port: ${SERVER_PORT:8081}

# --- Spring Boot Actuator ---
# Endpoints de management para operaciones (health checks, metrics, etc).
# Por seguridad: exponemos SOLO health e info por default.
# Otros perfiles (dev) pueden expandir la lista.
management:
  endpoints:
    web:
      exposure:
        # health: estado de la app + dependencias (BD, disk, etc)
        # info: metadata de la app (version, git)
        include: health, info
      # Cambiamos el path base de /actuator a /actuator (explicito)
      base-path: /actuator

  endpoint:
    health:
      # probes.enabled: true → expone /actuator/health/liveness y /readiness
      # Esto es lo que ECS/ALB usan como health check en produccion.
      probes:
        enabled: true
      # show-details: when-authorized → solo usuarios autenticados ven detalles.
      # Por default muestra solo UP/DOWN (suficiente para el LB).
      # Con authorized, un admin puede ver que componente fallo.
      show-details: when-authorized

  # Info endpoint: datos estaticos sobre la app
  info:
    env:
      enabled: true  # incluye info.* properties del yml
