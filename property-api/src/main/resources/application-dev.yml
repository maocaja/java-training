# ==================================================================
# Profile: dev
# Uso: desarrollo local en tu laptop (default si no se especifica otro)
# BD: H2 en memoria (rapida, sin instalacion)
# Logs: verbose, incluye SQL formateado
# H2 Console: habilitada en /h2-console
# ==================================================================
spring:
  datasource:
    url: jdbc:h2:mem:propertydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console: util en dev para inspeccionar la BD desde el browser.
  # NUNCA en prod — es un acceso directo a la BD sin auth robusta.
  h2:
    console:
      enabled: true
      path: /h2-console

# Logging verbose para debugging local
logging:
  level:
    com.mauricio.propertyapi: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Actuator: exponer TODOS los endpoints en dev para debugging.
# NO hacer esto en prod — /actuator/env leakea secrets, /actuator/heapdump
# expone memoria. En AWS se queda en la config minima del application.yml.
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      # En dev mostramos todos los detalles sin autenticacion
      show-details: always
