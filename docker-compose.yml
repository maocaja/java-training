# --- DOCKER COMPOSE GLOBAL ---
# Orquesta los 3 microservicios + PostgreSQL
#
# Arquitectura:
#
#   Cliente → api-gateway:8080 → property-api:8081 (REST)
#                               → pricing-api:8082  (JSON-RPC)
#                               → db (PostgreSQL)
#
# El cliente SOLO conoce el gateway (:8080).
# El gateway rutea al servicio correcto basado en el path.

services:
  # --- Base de datos ---
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: propertydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Pricing API (JSON-RPC) — servicio interno ---
  pricing-api:
    build: ./pricing-api
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082

  # --- Property API (REST) — servicio principal ---
  property-api:
    build: ./property-api
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/propertydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      JWT_SECRET: dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlbnM=
      JWT_EXPIRATION_MS: 3600000
      # Feign llama al pricing-api por nombre del container (Docker DNS)
      PRICING_SERVICE_URL: http://pricing-api:8082
    depends_on:
      db:
        condition: service_healthy
      pricing-api:
        condition: service_started

  # --- API Gateway — punto unico de entrada ---
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      PROPERTY_SERVICE_URL: http://property-api:8081
      PRICING_SERVICE_URL: http://pricing-api:8082
    depends_on:
      - property-api
      - pricing-api

volumes:
  postgres_data:
