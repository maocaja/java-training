# --- DOCKER COMPOSE GLOBAL ---
# Orquesta los 3 microservicios + PostgreSQL.
#
# Variables sensibles vienen de .env (gitignored).
# Copia .env.example a .env antes de correr docker-compose up.
#
# Arquitectura:
#   Cliente → api-gateway:8080 → property-api:8081 (REST)
#                               → pricing-api:8082  (JSON-RPC)
#                               → db (PostgreSQL)

services:
  # --- Base de datos ---
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Pricing API (JSON-RPC) — servicio interno ---
  pricing-api:
    build: ./pricing-api
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: dev

  # --- Property API (REST) — servicio principal ---
  property-api:
    build: ./property-api
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: dev
      # Override del datasource del profile dev (que usa H2 por default)
      # para usar el PostgreSQL del container.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # Secretos vienen de .env (gitignored).
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      # Feign llama al pricing-api por nombre del container (Docker DNS).
      PRICING_SERVICE_URL: http://pricing-api:8082
    depends_on:
      db:
        condition: service_healthy
      pricing-api:
        condition: service_started

  # --- API Gateway — punto unico de entrada ---
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PROPERTY_SERVICE_URL: http://property-api:8081
      PRICING_SERVICE_URL: http://pricing-api:8082
    depends_on:
      - property-api
      - pricing-api

volumes:
  postgres_data:
