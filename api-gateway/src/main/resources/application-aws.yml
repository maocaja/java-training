# Profile aws: logging production-appropriate.
# DEBUG del gateway es demasiado chatty (un log por request).
# En prod solo WARN/ERROR a menos que estemos debuggeando algo especifico.
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: WARN
    reactor.netty: WARN

# Actuator minimo en prod.
# NO exponemos "gateway" — revelaria topologia interna a atacantes.
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: never
