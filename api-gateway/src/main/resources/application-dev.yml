# Profile dev: logging DEBUG de Spring Cloud Gateway para ver que rutas matchean.
# Util cuando estas configurando rutas nuevas o debuggeando por que no se rutea.
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.server: INFO

# Actuator expandido en dev. Incluye "gateway" para inspeccionar rutas.
# Accedes a /actuator/gateway/routes para ver las rutas activas.
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
