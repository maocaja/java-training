# --- SPRING CLOUD GATEWAY CONFIG ---
# El gateway es el UNICO punto de entrada. Los clientes solo conocen :8080.
# Rutea cada request al microservicio correcto basado en el path.
#
# Equivalente en otras tecnologias:
#   - Nginx reverse proxy con location blocks
#   - Kong API Gateway
#   - Kubernetes Ingress
#
# Diferencia: Spring Cloud Gateway es PROGRAMABLE en Java.
# Podes agregar filtros custom (logging, rate limiting, auth) con codigo.
spring:
  application:
    name: api-gateway

  # Profile default para correr localmente.
  # En AWS se setea SPRING_PROFILES_ACTIVE=aws.
  profiles:
    default: dev

  # Graceful shutdown: 25s para terminar requests en vuelo antes de cerrar.
  # ECS envia SIGKILL a los 30s; le dejamos 5s de margen.
  lifecycle:
    timeout-per-shutdown-phase: 25s

  cloud:
    gateway:
      routes:
        # --- RUTA 1: property-api (REST) ---
        # Todo lo que empiece con /api/ va al property-api
        - id: property-service
          uri: ${PROPERTY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/**
          filters:
            - AddRequestHeader=X-Gateway, spring-cloud-gateway

        # --- RUTA 2: pricing-api (JSON-RPC) ---
        - id: pricing-service
          uri: ${PRICING_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/rpc
          filters:
            - AddRequestHeader=X-Gateway, spring-cloud-gateway

server:
  port: ${SERVER_PORT:8080}
  # Graceful shutdown del Netty del gateway. Igual que en los servicios.
  shutdown: graceful

# --- Actuator ---
# En el gateway, ademas de health/info, exponemos "gateway" que da visibilidad
# de las rutas registradas y sus filtros. Util para debugging de routing.
# NOTA: en prod NO exponemos "gateway" (podria revelar topologia interna).
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
